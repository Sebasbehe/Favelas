<!DOCTYPE html>
<html>
<head>
    <title>OTP</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="box">
        <div class="border-line"></div>
        <form onsubmit="return false;">
            <h2>Verificar OTP</h2>
            <p class="form-subtitle">Ingresa el código de 6 dígitos enviado a tu correo</p>

            <div class="otp-boxes">
                <input class="otp-digit" maxlength="1" type="text" inputmode="numeric">
                <input class="otp-digit" maxlength="1" type="text" inputmode="numeric">
                <input class="otp-digit" maxlength="1" type="text" inputmode="numeric">
                <input class="otp-digit" maxlength="1" type="text" inputmode="numeric">
                <input class="otp-digit" maxlength="1" type="text" inputmode="numeric">
                <input class="otp-digit" maxlength="1" type="text" inputmode="numeric">
            </div>

            <button class="btn" id="btnVerify" onclick="verificarOTP()">
                Verificar código
            </button>

            <p id="msg" style="color:#22d3ee; font-size:0.82rem; text-align:center; margin-top:14px;"></p>

            <div class="imp-links" style="justify-content:center; margin-top:16px;">
                <a href="login.html">← Volver al login</a>
            </div>
        </form>
    </div>

    <script src="app.js"></script>
    <script>
        // Auto-avanzar entre cajitas
        const digits = document.querySelectorAll('.otp-digit');
        digits.forEach((el, i) => {
            el.addEventListener('input', () => {
                if (el.value && i < digits.length - 1) digits[i + 1].focus();
            });
            el.addEventListener('keydown', e => {
                if (e.key === 'Backspace' && !el.value && i > 0) digits[i - 1].focus();
            });
        });

        // Reemplaza el OTP que manda app.js (une los 6 dígitos)
        function getOTPValue() {
            return [...digits].map(d => d.value).join('');
        }

        function setLoading(state) {
            const btn = document.getElementById("btnVerify");
            btn.disabled = state;
            btn.innerText = state ? "Verificando..." : "Verificar código";
        }
    </script>
</body>
</html>
