<!DOCTYPE html>
<html>
<head>
    <title>OTP</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">
    <h2>Verify OTP</h2>

    <input id="otp" placeholder="6-digit code">

    <button id="btnVerify" onclick="verificarOTP()">Verificar código</button>

    <p id="msg"></p>

    <button onclick="window.location.href='login.html'">
        Volver al login
    </button>
</div>

<script src="app.js"></script>

<script>
function setLoading(state) {
    const btn = document.getElementById("btnVerify");
    btn.disabled = state;
    btn.innerText = state ? "Verificando..." : "Verificar código";
}
</script>

</body>
</html>
