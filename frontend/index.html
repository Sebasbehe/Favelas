<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">
    <h2>Login OTP</h2>

    <input type="email" id="email" placeholder="Correo">

    <button id="btnSend" onclick="enviarOTP()">Enviar código</button>

    <p id="msg"></p>
</div>

<script src="app.js"></script>

<script>
function setLoading(state) {
    const btn = document.getElementById("btnSend");
    btn.disabled = state;
    btn.innerText = state ? "Enviando..." : "Enviar código";
}
</script>

</body>
</html>
